description: >-
  Aon plc is a London-headquartered global professional services firm
  delivering integrated risk and human capital advisory through two reporting
  pillars — Risk Capital (broking, reinsurance, risk analytics) and Human
  Capital (health, wealth, talent, rewards). The firm operates in over 120
  countries, lists on the NYSE under the ticker AON, and grew its US middle-market
  footprint with the April 2024 acquisition of NFP for roughly $13B. Aon
  publishes named analytics platforms (Risk Analyzer suite, ReMetrica, CyQu,
  Spectrum, Impact Forecasting catastrophe models, Radford McLagan
  Compensation Database, SkillsGraph, Gauge, Revenue GPS) but those tools are
  delivered through gated client portals — no developer portal, OpenAPI
  catalog, SDK org, or public API reference is published on aon.com.
