features:
  - type: Features
    data:
      - name: Risk Capital — Broking and Risk Transfer
        description: >-
          Global commercial insurance broking across property, casualty,
          financial lines, cyber, and specialty, paired with claims
          management.
      - name: Risk Capital — Reinsurance
        description: >-
          Treaty and facultative reinsurance broking with capital advisory,
          backed by 120+ Impact Forecasting catastrophe models, ReMetrica,
          Tyche, and PathWise tooling.
      - name: Risk Analytics Tooling
        description: >-
          Named client-side analytics — Risk Analyzer suite, ReMetrica,
          Aon's Risk Financing Analytics, CyQu, Spectrum — supporting
          program design and risk financing decisions.
      - name: Health and Benefits Advisory
        description: >-
          Medical, pharmacy, wellbeing, and global benefits program design
          for employers, supported by Aon's Global Medical Trend research.
      - name: Wealth Solutions
        description: >-
          Pension and retirement consulting, investment advisory, and
          delegated/OCIO investment management for plan sponsors.
      - name: Talent and Rewards Data
        description: >-
          Compensation, job architecture, pay equity, and assessment
          services backed by the Radford McLagan Compensation Database,
          SkillsGraph, Gauge, and Revenue GPS data products.
      - name: Middle Market via NFP
        description: >-
          Property and casualty, benefits, wealth, and retirement brokerage
          for middle-market clients delivered through NFP, acquired by Aon
          in April 2024 for approximately $13B.
      - name: Insights and Research
        description: >-
          Thematic research and reports (Global Risk Management Survey,
          Global Medical Trend Rates, Global Cyber Risk, Employee Sentiment)
          plus the "On Aon" podcast, distributed via gated downloads.
  - type: UseCases
    data:
      - name: Corporate Insurance Program Placement
        description: >-
          Multinational corporations sourcing property, casualty, cyber,
          and specialty coverage across geographies through Aon's broking
          platform.
      - name: Reinsurance Capital Optimization
        description: >-
          Insurance carriers structuring treaty and facultative reinsurance
          programs and optimizing capital usage with Aon's analytics.
      - name: Catastrophe Model Evaluation
        description: >-
          Insurers and reinsurers running portfolio analysis through Impact
          Forecasting's 120+ catastrophe models.
      - name: Employer Health Benefits Strategy
        description: >-
          Employers redesigning medical, pharmacy, and wellbeing programs
          informed by Aon's benchmarking and trend research.
      - name: Pension and OCIO Management
        description: >-
          Defined benefit and defined contribution plan sponsors engaging
          Aon for investment advisory or delegated investment management.
      - name: Compensation Benchmarking
        description: >-
          Employers benchmarking total rewards against the Radford McLagan
          Compensation Database and related Aon data assets.
      - name: Middle-Market Benefits Brokerage
        description: >-
          Mid-sized employers buying benefits and P&C brokerage through NFP,
          now an Aon company.
  - type: Integrations
    data:
      - name: NFP
        description: >-
          Aon-owned middle-market brokerage acquired in April 2024 for
          approximately $13B; operates under the NFP brand.
      - name: Impact Forecasting
        description: >-
          Aon's catastrophe modelling unit providing 120+ peril models
          backing the Reinsurance practice.
      - name: Radford McLagan Compensation Database
        description: >-
          Aon's flagship compensation benchmarking dataset spanning
          technology, life sciences, and financial services roles.
      - name: ReMetrica / Tyche / PathWise
        description: >-
          Actuarial and capital-modelling tools deployed to insurance and
          reinsurance clients.
      - name: CyQu
        description: >-
          Aon's cyber risk quantification and assessment platform.
      - name: SkillsGraph / Gauge / Revenue GPS
        description: >-
          Workforce-analytics and industry-performance data products
          delivered through Talent and Rewards engagements.
      - name: Applicant Tracking System Connectors
        description: >-
          Aon's assessment solutions integrate with 80+ applicant tracking
          systems for talent acquisition workflows.

